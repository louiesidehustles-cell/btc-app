<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Trading Terminal</title>

<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/5968/5968260.png">

<style>
body { background:#0e1117; color:white; font-family:Arial; padding:20px; }

.tabs { margin-bottom:20px; }

.tab {
    display:inline-block;
    padding:10px 20px;
    background:#161b22;
    cursor:pointer;
    margin-right:5px;
}

.tab.active { background:#00ff9f; color:black; }

.section { display:none; }
.section.active { display:block; }

table {
    width:100%;
    border-collapse:collapse;
    margin-bottom:30px;
}

th, td {
    padding:10px;
    text-align:center;
    border-bottom:1px solid #222;
}

th { color:#888; }

.green { color:#00ff9f; }
.red { color:#ff4d4d; }

.flash-up { animation: up 0.4s; }
.flash-down { animation: down 0.4s; }

@keyframes up { 0% { background:#003d2e; } 100% { background:transparent; } }
@keyframes down { 0% { background:#3d0000; } 100% { background:transparent; } }

.date-header {
    margin-top:25px;
    font-size:16px;
    color:#f1c40f;
}
</style>
</head>

<body>

<p id="tz" style="color:#888;"></p>

<div class="tabs">
    <div class="tab active" onclick="switchTab(event,'main')">Main</div>
    <div class="tab" onclick="switchTab(event,'lowrisk')">Low Risk</div>
    <div class="tab" onclick="switchTab(event,'history')">History</div>
    <div class="tab" onclick="switchTab(event,'calculator')">Calculator</div>
</div>

<div id="main" class="section active">
    <h2>Open Trades (Risk 3–5)</h2>
    <table id="trades"></table>

    <h2>Market Prices</h2>
    <table id="prices"></table>
</div>

<div id="lowrisk" class="section">
    <h2>Low Risk Trades (Risk 1–2)</h2>
    <table id="lowTrades"></table>
</div>

<div id="history" class="section">
    <h2>Trade History</h2>
    <div id="historyContent"></div>
</div>

<div id="calculator" class="section">
    <h2>Trade Calculator</h2>

    <div style="max-width:400px;">

        <label>Investment ($)</label><br>
        <input id="inv" type="number" value="100"><br><br>

        <label>Entry Price</label><br>
        <input id="entryCalc" type="number"><br><br>

        <label>Stop Loss (SL)</label><br>
        <input id="slCalc" type="number"><br><br>

        <label>Take Profit (TP)</label><br>
        <input id="tpCalc" type="number"><br><br>

        <label>Leverage (x)</label><br>
        <input id="lev" type="number" value="1"><br><br>

        <button onclick="calculateTrade()" 
        style="padding:10px;width:100%;background:#00ff9f;border:none;color:black;">
            Calculate
        </button>

        <div id="calcResult" style="margin-top:20px;"></div>
    </div>
</div>
<script>

let lastPrices = {}

function switchTab(e, tab) {
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))
    e.target.classList.add("active")
    document.getElementById(tab).classList.add("active")
}

function formatTime(t){
    const d = new Date(t + "Z") // force UTC
    return d.toLocaleString(undefined, {
        timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone,
        day:"2-digit",
        month:"short",
        hour:"2-digit",
        minute:"2-digit",
        second:"2-digit"
    })
}

document.getElementById("tz").innerText =
"Timezone: " + Intl.DateTimeFormat().resolvedOptions().timeZone

// TRADES
async function loadTrades() {
    try{
        const res = await fetch("/data?t="+Date.now())
        const data = await res.json()

        const priceRes = await fetch("/prices?t="+Date.now())
        const prices = await priceRes.json()

        let priceMap = {}
        prices.forEach(p => priceMap[p.symbol] = p.price)

        const mainTable = document.getElementById("trades")
        const lowTable = document.getElementById("lowTrades")

        const header = `
        <tr>
            <th>Time</th><th>Symbol</th><th>Entry</th>
            <th>TP</th><th>SL</th><th>Risk</th><th>PnL</th>
        </tr>`

        mainTable.innerHTML = header
        lowTable.innerHTML = header

        if(!data.open_trades) return

        data.open_trades.forEach(t => {

            let live = priceMap[t.symbol] || t.entry
            let entry = parseFloat(t.entry || 0)

            let profit = (live - entry) * (100/entry || 0)
            let cls = profit >= 0 ? "green" : "red"

            let row = `
            <tr>
                <td>${formatTime(t.time)}</td>
                <td>${t.symbol}</td>
                <td>${entry.toFixed(2)}</td>
                <td>${t.tp}</td>
                <td>${t.sl}</td>
                <td>${t.risk}</td>
                <td class="${cls}">${profit.toFixed(2)}</td>
            </tr>`

            if (t.risk >= 3) mainTable.innerHTML += row
            else lowTable.innerHTML += row
        })
    }catch(e){
        console.log("trade error", e)
    }
}

// PRICES
async function loadPrices() {
    try{
        const res = await fetch("/prices?t=" + Date.now())
        const data = await res.json()

        const table = document.getElementById("prices")
        table.innerHTML = `<tr><th>Symbol</th><th>Price</th></tr>`

        data.forEach(p => {
            let prev = lastPrices[p.symbol] ?? p.price
            let cls="", arrow=""

            if(p.price > prev){ cls="green flash-up"; arrow="↑" }
            else if(p.price < prev){ cls="red flash-down"; arrow="↓" }

            table.innerHTML += `
            <tr>
                <td>${p.symbol}</td>
                <td class="${cls}">${p.price.toFixed(4)} ${arrow}</td>
            </tr>`

            lastPrices[p.symbol] = p.price
        })
    }catch(e){
        console.log("price error", e)
    }
}

// HISTORY
async function loadHistory() {
    const res = await fetch("/history?t="+Date.now())
    const data = await res.json()

    const priceRes = await fetch("/prices?t="+Date.now())
    const prices = await priceRes.json()

    let priceMap = {}
    prices.forEach(p => priceMap[p.symbol] = p.price)

    const container = document.getElementById("historyContent")
    container.innerHTML = ""

    Object.keys(data).reverse().forEach(date => {

        let trades = data[date]

        let html = `
        <div class="date-header">${date}</div>
        <table>
        <tr>
            <th>Time</th><th>Symbol</th><th>Dir</th>
            <th>Entry</th><th>SL</th><th>TP</th>
            <th>Risk</th><th>PnL</th>
        </tr>`

        trades.forEach(t => {

            let live = priceMap[t.symbol] || 0
            let entry = parseFloat(t.entry)

            let qty = 100 / entry
            let profit = t.profit || 0
            let pct = t.pct || 0
            let cls = profit >= 0 ? "green" : "red"

            html += `
            <tr>
                <td>${formatTime(t.time)}</td>
                <td>${t.symbol}</td>
                <td class="green">${t.dir}</td>
                <td>${entry.toFixed(2)}</td>
                <td>${t.sl}</td>
                <td>${t.tp}</td>
                <td>${t.risk}</td>
                <td class="${cls}">
                    $${profit.toFixed(2)} (${pct.toFixed(2)}%)
                </td>
            </tr>`
        })

        html += "</table>"
        container.innerHTML += html
    })
}
// CALC
function calculateTrade() {
    const inv = parseFloat(document.getElementById("inv").value)
    const entry = parseFloat(document.getElementById("entryCalc").value)
    const sl = parseFloat(document.getElementById("slCalc").value)
    const tp = parseFloat(document.getElementById("tpCalc").value)

    if (!inv || !entry || !sl || !tp) {
        calcResult.innerHTML = "❌ Fill all fields"
        return
    }

    const qty = inv / entry
    const profit = (tp - entry) * qty
    const loss = (sl - entry) * qty

    calcResult.innerHTML = `
        <div class="green">TP: $${profit.toFixed(2)}</div>
        <div class="red">SL: $${loss.toFixed(2)}</div>
    `
}

// LOOP
function updateAll(){
    loadTrades()
    loadPrices()
    loadHistory()
}

setInterval(updateAll,5000)
updateAll()

</script>

</body>
</html>
