<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Trading Terminal</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body {
    background:#0b0f14;
    color:#e6edf3;
    font-family:Segoe UI, Arial;
    margin:0;
}

.topbar {
    display:flex;
    justify-content:space-between;
    padding:15px 25px;
    background:#11161c;
    border-bottom:1px solid #1f2a33;
}

.stat span { color:#00ff9f; font-weight:bold; }

.tabs {
    display:flex;
    padding:10px 20px;
    border-bottom:1px solid #1f2a33;
}

.tab {
    padding:10px 18px;
    cursor:pointer;
    margin-right:10px;
    border-radius:6px;
}

.tab.active {
    background:#00ff9f;
    color:black;
}

.section { display:none; padding:20px; }
.section.active { display:block; }

.grid {
    display:grid;
    grid-template-columns:50% 50%;
    gap:20px;
}

.grid-2 {
    display:grid;
    grid-template-columns:35% 65%;
    gap:20px;
    margin-top:20px;
}

.card {
    background:#11161c;
    padding:15px;
    border-radius:10px;
}

table {
    width:100%;
    border-collapse:collapse;
}

th, td {
    padding:10px;
    text-align:center;
    border-bottom:1px solid #1f2a33;
}

th { color:#888; }

.green { color:#00ff9f; }
.red { color:#ff4d4d; }
.yellow { color:#ffc857; }

</style>
</head>

<body>

<div class="topbar">
    <div>Balance: <span id="balance">Loading...</span></div>
    <div>Active Trades: <span id="activeTrades">0</span></div>
    <div>Timezone: <span id="tz"></span></div>
</div>

<div class="tabs">
    <div class="tab active" onclick="switchTab(event,'dashboard')">Dashboard</div>
    <div class="tab" onclick="switchTab(event,'history')">History</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section active">

    <div class="grid">
        <div class="card">
            <h3>Low Risk Trades</h3>
            <table id="lowTrades"></table>
        </div>

        <div class="card">
            <h3>High Risk Trades</h3>
            <table id="highTrades"></table>
        </div>
    </div>

    <div class="grid-2">
        <div class="card">
            <h3>Market Prices</h3>
            <table id="prices"></table>
        </div>

        <div class="card">
            <h3 id="chartTitle">BTCUSDT Chart</h3>
            <div id="chartContainer"></div>
        </div>
    </div>

</div>

<!-- HISTORY -->
<div id="history" class="section">
    <div class="card">
        <h3>Trade History</h3>
        <div id="historyContent"></div>
    </div>
</div>

<script>

let lastPrices = {}

document.getElementById("tz").innerText =
Intl.DateTimeFormat().resolvedOptions().timeZone

function switchTab(e, tab){
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))
    e.target.classList.add("active")
    document.getElementById(tab).classList.add("active")
}

function formatTime(t){
    return new Date(t + "Z").toLocaleTimeString()
}

// ===== TRADES =====
async function loadTrades(){
    const res = await fetch("/data")
    const data = await res.json()

    const priceRes = await fetch("/prices")
    const prices = await priceRes.json()

    let map={}
    prices.forEach(p=>map[p.symbol]=p.price)

    let low = document.getElementById("lowTrades")
    let high = document.getElementById("highTrades")

    let header = `<tr>
    <th>Time</th><th>Symbol</th><th>Entry</th>
    <th>TP</th><th>SL</th><th>Risk</th><th>PnL</th></tr>`

    // ✅ FIX: RESET TABLE
    low.innerHTML = header
    high.innerHTML = header

    let count = 0

    data.open_trades?.forEach(t=>{
        count++

        let live = map[t.symbol] || t.entry
        let pnl = (live - t.entry)/t.entry*100
        let cls = pnl>=0?"green":"red"

        let riskColor =
            t.risk >= 4 ? "green" :
            t.risk == 3 ? "yellow" :
            "red"

        let row = `
        <tr>
        <td>${formatTime(t.time)}</td>
        <td>${t.symbol}</td>
        <td>${t.entry}</td>
        <td>${t.tp}</td>
        <td>${t.sl}</td>
        <td class="${riskColor}"><b>${t.risk}</b></td>
        <td class="${cls}">${pnl.toFixed(2)}%</td>
        </tr>`

        if(t.risk >=3) low.innerHTML += row
        else high.innerHTML += row
    })

    document.getElementById("activeTrades").innerText = count
}
//==== balance update =====
async function loadBalance(){
    try{
        const res = await fetch("/balance")
        const data = await res.json()

        document.getElementById("balance").innerText =
            "$" + data.balance.toFixed(2)
    }catch(e){
        console.log("Balance error", e)
    }
}

// ===== PRICES =====
async function loadPrices(){
    const res = await fetch("/prices")
    const data = await res.json()

    let table = document.getElementById("prices")
    table.innerHTML = `<tr><th>Symbol</th><th>Price</th></tr>`

    data.forEach(p=>{
        let prev = lastPrices[p.symbol] ?? p.price
        let cls = p.price>prev?"green":p.price<prev?"red":""

        table.innerHTML += `
        <tr>
        <td onclick="loadChart('${p.symbol}')" style="cursor:pointer;color:#00ff9f;">
        ${p.symbol}</td>
        <td class="${cls}">${p.price.toFixed(4)}</td>
        </tr>`

        lastPrices[p.symbol] = p.price
    })
}

// ===== CHART =====
function loadChart(symbol){
    document.getElementById("chartTitle").innerText = symbol + " Chart"
    document.getElementById("chartContainer").innerHTML = `<div id="tv_chart"></div>`

    new TradingView.widget({
        container_id: "tv_chart",
        width: "100%",
        height: 500,
        symbol: "BINANCE:" + symbol,
        interval: "5",
        theme: "dark"
    })
}

// ===== HISTORY =====
async function loadHistory(){
    const res = await fetch("/history")
    const data = await res.json()

    let container = document.getElementById("historyContent")
    container.innerHTML=""

    Object.keys(data).reverse().forEach(date=>{

        let trades = data[date]

        let pnl = 0, wins=0, losses=0
        let lastBalance = 0

        trades.forEach(t=>{
            let p = parseFloat(t.profit||0)
            pnl += p
            lastBalance = t.balance || lastBalance
            if(p>0) wins++; else losses++
        })

        container.innerHTML += `
        <div style="margin-bottom:20px;padding:15px;background:#11161c;border-radius:10px;">
            
            <b>${date}</b> |
            Trades:${trades.length} |
            Wins:<span class="green">${wins}</span> |
            Loss:<span class="red">${losses}</span> |
            PnL:<span class="${pnl>=0?'green':'red'}">$${pnl.toFixed(2)}</span> |
            Balance:<span class="green">$${lastBalance}</span>

            <table>
            <tr>
                <th>Time</th><th>Symbol</th><th>Entry</th>
                <th>TP</th><th>SL</th><th>Risk</th><th>PnL</th>
            </tr>

            ${
                trades.map(t=>`
                <tr>
                    <td>${formatTime(t.time)}</td>
                    <td>${t.symbol}</td>
                    <td>${t.entry.toFixed(2)}</td>
                    <td>${t.tp.toFixed(2)}</td>
                    <td>${t.sl.toFixed(2)}</td>
                    <td>${t.risk}</td>
                    <td class="${t.profit>=0?'green':'red'}">
                        $${t.profit} (${t.pct}%)
                    </td>
                </tr>
                `).join("")
            }

            </table>
        </div>`
    })
}

// LOOP
function update(){
    loadTrades()
    loadPrices()
    loadHistory()
    loadBalance()   // 🔥 THIS WAS MISSING
}

setInterval(update,4000)
update()
loadBalance()

loadChart("BTCUSDT")

</script>
</body>
</html>
