<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Trading Terminal</title>

<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/5968/5968260.png">

<style>
body {
    background:#0b0f14;
    color:#e6edf3;
    font-family:Segoe UI, Arial;
    margin:0;
}

/* TOP BAR */
.topbar {
    display:flex;
    justify-content:space-between;
    padding:15px 25px;
    background:#11161c;
    border-bottom:1px solid #1f2a33;
}

.stat {
    font-size:14px;
}
.stat span {
    color:#00ff9f;
    font-weight:bold;
}

/* TABS */
.tabs {
    display:flex;
    padding:10px 20px;
    border-bottom:1px solid #1f2a33;
}

.tab {
    padding:10px 18px;
    cursor:pointer;
    margin-right:10px;
    border-radius:6px;
}

.tab.active {
    background:#00ff9f;
    color:black;
}

/* SECTIONS */
.section { display:none; padding:20px; }
.section.active { display:block; }

/* CARD STYLE */
.card {
    background:#11161c;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
}

/* TABLE */
table {
    width:100%;
    border-collapse:collapse;
}

th, td {
    padding:10px;
    text-align:center;
    border-bottom:1px solid #1f2a33;
}

th { color:#888; }

.green { color:#00ff9f; }
.red { color:#ff4d4d; }

/* PRICE FLASH */
.flash-up { background:#003d2e; }
.flash-down { background:#3d0000; }

/* CALC */
input {
    width:100%;
    padding:10px;
    background:#0b0f14;
    border:1px solid #1f2a33;
    color:white;
    border-radius:6px;
}

button {
    margin-top:10px;
    padding:12px;
    width:100%;
    background:#00ff9f;
    border:none;
    font-weight:bold;
    border-radius:6px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
    <div class="stat">Balance: <span>$1000</span></div>
    <div class="stat">Active Trades: <span id="activeTrades">0</span></div>
    <div class="stat">Timezone: <span id="tz"></span></div>
</div>

<!-- TABS -->
<div class="tabs">
    <div class="tab active" onclick="switchTab(event,'low')">Low Risk</div>
    <div class="tab" onclick="switchTab(event,'high')">High Risk</div>
    <div class="tab" onclick="switchTab(event,'history')">History</div>
    <div class="tab" onclick="switchTab(event,'calc')">Calculator</div>
</div>

<!-- LOW RISK -->
<div id="low" class="section active">
    <div class="card">
        <h3>Low Risk Trades (3–5)</h3>
        <table id="lowTrades"></table>
    </div>

    <div class="card">
        <h3>Market Prices</h3>
        <table id="prices"></table>
    </div>
</div>

<!-- HIGH RISK -->
<div id="high" class="section">
    <div class="card">
        <h3>High Risk Trades (1–2)</h3>
        <table id="highTrades"></table>
    </div>
</div>

<!-- HISTORY -->
<div id="history" class="section">
    <div class="card">
        <h3>Trade History</h3>
        <div id="historyContent"></div>
    </div>
</div>

<!-- CALCULATOR -->
<div id="calc" class="section">
    <div class="card">
        <h3>Calculator</h3>

        <input id="inv" placeholder="Investment">
        <input id="entry" placeholder="Entry">
        <input id="sl" placeholder="Stop Loss">
        <input id="tp" placeholder="Take Profit">

        <button onclick="calc()">Calculate</button>

        <div id="result"></div>
    </div>
</div>

<script>

let lastPrices = {}

document.getElementById("tz").innerText =
Intl.DateTimeFormat().resolvedOptions().timeZone

function switchTab(e, tab){
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))
    e.target.classList.add("active")
    document.getElementById(tab).classList.add("active")
}

function formatTime(t){
    return new Date(t + "Z").toLocaleTimeString()
}

// LOAD TRADES
async function loadTrades(){
    const res = await fetch("/data?t="+Date.now())
    const data = await res.json()

    const priceRes = await fetch("/prices?t="+Date.now())
    const prices = await priceRes.json()

    let map={}
    prices.forEach(p=>map[p.symbol]=p.price)

    const low = document.getElementById("lowTrades")
    const high = document.getElementById("highTrades")

    const header = `
    <tr>
    <th>Time</th><th>Symbol</th><th>Entry</th>
    <th>TP</th><th>SL</th><th>PnL</th>
    </tr>`

    low.innerHTML = header
    high.innerHTML = header

    let count = 0

    data.open_trades?.forEach(t=>{
        count++

        let live = map[t.symbol] || t.entry
        let pnl = (live - t.entry)/t.entry*100
        let cls = pnl>=0?"green":"red"

        let row = `
        <tr>
        <td>${formatTime(t.time)}</td>
        <td>${t.symbol}</td>
        <td>${t.entry}</td>
        <td>${t.tp}</td>
        <td>${t.sl}</td>
        <td class="${cls}">${pnl.toFixed(2)}%</td>
        </tr>`

        if(t.risk >=3) low.innerHTML += row
        else high.innerHTML += row
    })

    document.getElementById("activeTrades").innerText = count
}

// LOAD PRICES
async function loadPrices(){
    const res = await fetch("/prices?t="+Date.now())
    const data = await res.json()

    const table = document.getElementById("prices")
    table.innerHTML = `<tr><th>Symbol</th><th>Price</th></tr>`

    data.forEach(p=>{
        let prev = lastPrices[p.symbol] ?? p.price
        let cls = p.price>prev?"green":p.price<prev?"red":""

        table.innerHTML += `
        <tr>
        <td>${p.symbol}</td>
        <td class="${cls}">${p.price.toFixed(4)}</td>
        </tr>`

        lastPrices[p.symbol] = p.price
    })
}

// HISTORY
async function loadHistory() {
    try{
        const res = await fetch("/history?t="+Date.now())
        const data = await res.json()

        const container = document.getElementById("historyContent")
        container.innerHTML = ""

        // sort newest first
        Object.keys(data).sort().reverse().forEach(date => {

            let trades = data[date]

            let html = `
            <div class="date-header">${date}</div>
            <table>
            <tr>
                <th>Time</th>
                <th>Symbol</th>
                <th>Dir</th>
                <th>Entry</th>
                <th>SL</th>
                <th>TP</th>
                <th>Risk</th>
                <th>PnL</th>
            </tr>`

            trades.forEach(t => {

                let profit = parseFloat(t.profit || 0)
                let pct = parseFloat(t.pct || 0)

                let cls = profit >= 0 ? "green" : "red"

                html += `
                <tr>
                    <td>${formatTime(t.time)}</td>
                    <td>${t.symbol}</td>
                    <td class="green">${t.dir}</td>
                    <td>${parseFloat(t.entry).toFixed(2)}</td>
                    <td>${t.sl}</td>
                    <td>${t.tp}</td>
                    <td>${t.risk ?? "-"}</td>
                    <td class="${cls}">
                        $${profit.toFixed(2)} (${pct.toFixed(2)}%)
                    </td>
                </tr>`
            })

            html += "</table>"
            container.innerHTML += html
        })

    } catch(e){
        console.log("history error", e)
    }
}
// CALC
function calc() {
    const calcResult = document.getElementById("calcResult")

    const inv = parseFloat(document.getElementById("inv").value)
    const entry = parseFloat(document.getElementById("entryCalc").value)
    const sl = parseFloat(document.getElementById("slCalc").value)
    const tp = parseFloat(document.getElementById("tpCalc").value)
    const lev = parseFloat(document.getElementById("lev").value)

    if (!inv || !entry || !sl || !tp || !lev) {
        calcResult.innerHTML = "❌ Fill all fields"
        return
    }

    // ✅ position size with leverage
    const positionSize = inv * lev

    // ✅ quantity of asset
    const qty = positionSize / entry

    // ✅ profit & loss
    const profit = (tp - entry) * qty
    const loss = (sl - entry) * qty

    // ✅ percentage based on initial capital (NOT leveraged size)
    const profitPct = (profit / inv) * 100
    const lossPct = (loss / inv) * 100
    const rr = Math.abs(profit / loss)

    calcResult.innerHTML += `
        <div class="green">💰 Profit: $${profit.toFixed(2)} (${profitPct.toFixed(2)}%)</div>
        <div class="red">🛑 Loss: $${loss.toFixed(2)} (${lossPct.toFixed(2)}%)</div>
        <div style="color:#888;">Position Size: $${positionSize.toFixed(2)}</div>
    `
}

// LOOP
function update(){
    loadTrades()
    loadPrices()
    loadHistory()
}

setInterval(update,4000)
update()

</script>

</body>
</html>
