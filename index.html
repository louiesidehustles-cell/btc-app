<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Trading Terminal</title>
<script src="https://s3.tradingview.com/tv.js"></script>
<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/5968/5968260.png">

<style>
body {
    background:#0b0f14;
    color:#e6edf3;
    font-family:Segoe UI, Arial;
    margin:0;
}

/* TOP BAR */
.topbar {
    display:flex;
    justify-content:space-between;
    padding:15px 25px;
    background:#11161c;
    border-bottom:1px solid #1f2a33;
}

.stat { font-size:14px; }
.stat span { color:#00ff9f; font-weight:bold; }

/* TABS */
.tabs {
    display:flex;
    padding:10px 20px;
    border-bottom:1px solid #1f2a33;
}

.tab {
    padding:10px 18px;
    cursor:pointer;
    margin-right:10px;
    border-radius:6px;
}

.tab.active {
    background:#00ff9f;
    color:black;
}

/* SECTIONS */
.section { display:none; padding:20px; }
.section.active { display:block; }

/* GRID */
.grid {
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:20px;
}

/* MARKET + CHART SPLIT */
.grid-2 {
    display:grid;
    grid-template-columns: 35% 65%;
    gap:20px;
    margin-top:20px;
}

@media (max-width:900px){
    .grid, .grid-2 {
        grid-template-columns:1fr;
    }
}

/* CARD */
.card {
    background:#11161c;
    padding:15px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
}

/* TABLE */
table {
    width:100%;
    border-collapse:collapse;
}

th, td {
    padding:10px;
    text-align:center;
    border-bottom:1px solid #1f2a33;
}

th { color:#888; }

.green { color:#00ff9f; }
.red { color:#ff4d4d; }

/* INPUT */
input {
    width:100%;
    padding:10px;
    background:#0b0f14;
    border:1px solid #1f2a33;
    color:white;
    border-radius:6px;
    margin-bottom:10px;
}

button {
    margin-top:10px;
    padding:12px;
    width:100%;
    background:#00ff9f;
    border:none;
    font-weight:bold;
    border-radius:6px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="topbar">
    <div class="stat">Balance: <span>$1000</span></div>
    <div class="stat">Active Trades: <span id="activeTrades">0</span></div>
    <div class="stat">Timezone: <span id="tz"></span></div>
</div>

<div class="tabs">
    <div class="tab active" onclick="switchTab(event,'dashboard')">Dashboard</div>
    <div class="tab" onclick="switchTab(event,'history')">History</div>
    <div class="tab" onclick="switchTab(event,'calc')">Calculator</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section active">

    <!-- TRADES -->
    <div class="grid">
        <div class="card">
            <h3>Low Risk Trades</h3>
            <table id="lowTrades"></table>
        </div>

        <div class="card">
            <h3>High Risk Trades</h3>
            <table id="highTrades"></table>
        </div>
    </div>

    <!-- MARKET + CHART -->
    <div class="grid-2">

        <!-- LEFT: MARKET -->
        <div class="card">
            <h3>Market Prices</h3>
            <table id="prices"></table>
        </div>

        <!-- RIGHT: CHART -->
        <div class="card">
            <h3 id="chartTitle">BTCUSDT Chart</h3>
            <div id="chartContainer"></div>
        </div>

    </div>

</div>

<!-- HISTORY -->
<div id="history" class="section">
    <div class="card">
        <h3>Trade History</h3>
        <div id="historyContent"></div>
    </div>
</div>

<!-- CALCULATOR -->
<div id="calc" class="section">
    <div class="card">
        <h3>Calculator</h3>

        <input id="inv" type="number" placeholder="Investment">
        <input id="entry" type="number" placeholder="Entry">
        <input id="sl" type="number" placeholder="Stop Loss">
        <input id="tp" type="number" placeholder="Take Profit">
        <input id="lev" type="number" placeholder="Leverage">

        <button onclick="calc()">Calculate</button>

        <div id="result"></div>
    </div>
</div>

<script>

let lastPrices = {}

document.getElementById("tz").innerText =
Intl.DateTimeFormat().resolvedOptions().timeZone

function switchTab(e, tab){
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))
    e.target.classList.add("active")
    document.getElementById(tab).classList.add("active")
}

function formatTime(t){
    return new Date(t + "Z").toLocaleTimeString()
}

// LOAD TRADES
async function loadTrades(){
    const res = await fetch("/data?t="+Date.now())
    const data = await res.json()

    const priceRes = await fetch("/prices?t="+Date.now())
    const prices = await priceRes.json()

    let map={}
    prices.forEach(p=>map[p.symbol]=p.price)

    const low = document.getElementById("lowTrades")
    const high = document.getElementById("highTrades")

    const header = `<tr>
    <th>Time</th><th>Symbol</th><th>Entry</th>
    <th>TP</th><th>SL</th><th>PnL</th></tr>`

    low.innerHTML = header
    high.innerHTML = header

    let count = 0

    data.open_trades?.forEach(t=>{
        count++

        let live = map[t.symbol] || t.entry
        let pnl = (live - t.entry)/t.entry*100
        let cls = pnl>=0?"green":"red"

        let row = `
        <tr>
        <td>${formatTime(t.time)}</td>
        <td>${t.symbol}</td>
        <td>${t.entry}</td>
        <td>${t.tp}</td>
        <td>${t.sl}</td>
        <td class="${cls}">${pnl.toFixed(2)}%</td>
        </tr>`

        if(t.risk >=3) low.innerHTML += row
        else high.innerHTML += row
    })

    document.getElementById("activeTrades").innerText = count
}

// LOAD PRICES (CLICKABLE)
async function loadPrices(){
    const res = await fetch("/prices?t="+Date.now())
    const data = await res.json()

    const table = document.getElementById("prices")
    table.innerHTML = `<tr><th>Symbol</th><th>Price</th></tr>`

    data.forEach(p=>{
        let prev = lastPrices[p.symbol] ?? p.price
        let cls = p.price>prev?"green":p.price<prev?"red":""

        table.innerHTML += `
        <tr>
        <td onclick="loadChart('${p.symbol}')" 
            style="cursor:pointer;color:#00ff9f;">
            ${p.symbol}
        </td>
        <td class="${cls}">${p.price.toFixed(4)}</td>
        </tr>`

        lastPrices[p.symbol] = p.price
    })
}

// LOAD CHART
function loadChart(symbol){

    document.getElementById("chartTitle").innerText = symbol + " Chart"

    document.getElementById("chartContainer").innerHTML = `
        <div id="tv_chart"></div>
    `

    new TradingView.widget({
        "container_id": "tv_chart",
        "width": "100%",
        "height": 500,
        "symbol": "BINANCE:" + symbol,
        "interval": "5",
        "theme": "dark",
        "style": "1",
        "toolbar_bg": "#11161c",
        "studies": [
            "Volume@tv-basicstudies",
            "RSI@tv-basicstudies",
            "Moving Average Exponential@tv-basicstudies"
        ]
    })
}

// HISTORY
async function loadHistory(){
    const res = await fetch("/history?t="+Date.now())
    const data = await res.json()

    const container = document.getElementById("historyContent")
    container.innerHTML=""

    Object.keys(data).reverse().forEach(date=>{
        container.innerHTML += `<div>${date}</div>`
    })
}

// CALC
function calc(){
    const inv = parseFloat(inv.value)
    const entry = parseFloat(entry.value)
    const sl = parseFloat(sl.value)
    const tp = parseFloat(tp.value)
    const lev = parseFloat(lev.value)

    if(!inv||!entry||!sl||!tp||!lev){
        result.innerHTML="❌ Fill all"
        return
    }

    let size = inv*lev
    let qty = size/entry
    let profit = (tp-entry)*qty
    let loss = (sl-entry)*qty

    result.innerHTML=`
    <div class="green">Profit: $${profit.toFixed(2)}</div>
    <div class="red">Loss: $${loss.toFixed(2)}</div>`
}

// LOOP
function update(){
    loadTrades()
    loadPrices()
    loadHistory()
}

setInterval(update,4000)
update()

// AUTO LOAD BTC
loadChart("BTCUSDT")

</script>
</body>
</html>
