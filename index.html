<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Trading Terminal</title>

<style>
body { background:#0b0f14; color:#e6edf3; font-family:Segoe UI; margin:0; }

.topbar {
    display:flex; justify-content:space-between;
    padding:15px 25px; background:#11161c;
}

.tabs { display:flex; padding:10px; background:#11161c; }
.tab { padding:10px 20px; cursor:pointer; }
.tab.active { background:#00ff9f; color:black; }

.section { display:none; padding:20px; }
.section.active { display:block; }

.grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }

.card { background:#11161c; padding:15px; border-radius:10px; }

table { width:100%; border-collapse:collapse; }
th, td { padding:8px; text-align:center; border-bottom:1px solid #222; }

.green { color:#00ff9f; }
.red { color:#ff4d4d; }

input, button {
    width:100%; padding:10px; margin-bottom:10px;
    background:#0b0f14; color:white; border:1px solid #333;
}

button { background:#00ff9f; color:black; cursor:pointer; }
</style>
</head>

<body>

<div class="topbar">
    <div>Balance: <span id="balance">$0.00</span></div>
    <div>Active Trades: <span id="activeTrades">0</span></div>
    <div>Timezone: <span id="tz"></span></div>
</div>

<div class="tabs">
    <div class="tab active" onclick="switchTab(event,'dashboard')">Dashboard</div>
    <div class="tab" onclick="switchTab(event,'history')">History</div>
    <div class="tab" onclick="switchTab(event,'calc')">Calculator</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section active">

<div class="grid">

<div class="card">
<h3>Low Risk (3-5)</h3>
<table id="lowTrades"></table>
</div>

<div class="card">
<h3>High Risk (1-2)</h3>
<table id="highTrades"></table>
</div>

</div>

<div class="card" style="margin-top:20px;">
<h3>Market Prices</h3>
<table id="prices"></table>
</div>

</div>

<!-- HISTORY -->
<div id="history" class="section">
<div class="grid">

<div class="card">
<h3>Strategy A (SL + TP)</h3>
<div id="historyA"></div>
</div>

<div class="card">
<h3>Strategy B (No SL)</h3>
<div id="historyB"></div>
</div>

</div>
</div>

<!-- CALCULATOR -->
<div id="calc" class="section">

<div class="grid">

<div class="card">
<h3>Standard Calculator</h3>

<input id="inv" placeholder="Investment">
<input id="entry" placeholder="Entry">
<input id="sl" placeholder="Stop Loss">
<input id="tp" placeholder="Take Profit">
<input id="lev" placeholder="Leverage">

<button onclick="calc()">Calculate</button>
<div id="result"></div>

</div>

<div class="card">
<h3>Compound Calculator</h3>

<input id="c_start" placeholder="Start Balance">
<input id="c_risk" placeholder="Risk %">
<input id="c_winrate" placeholder="Winrate %">
<input id="c_trades" placeholder="Trades/day">
<input id="c_days" placeholder="Days">

<button onclick="compoundCalc()">Run</button>
<div id="compoundResult"></div>

</div>

</div>

</div>

<script>

document.getElementById("tz").innerText =
Intl.DateTimeFormat().resolvedOptions().timeZone

function switchTab(e, tab){
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))
    e.target.classList.add("active")
    document.getElementById(tab).classList.add("active")
}

// SAFE FETCH (prevents crashes)
async function safeFetch(url){
    try{
        const res = await fetch(url)
        return await res.json()
    }catch(e){
        console.log("Fetch failed:", url)
        return null
    }
}

function formatTime(t){
    return new Date(t + "Z").toLocaleTimeString()
}

let lastPrices = {}

// ================= TRADES =================
async function loadTrades(){

    let data = await safeFetch("/data") || {open_trades: []}
    let prices = await safeFetch("/prices") || []

    let map={}
    prices.forEach(p=>map[p.symbol]=p.price)

    let low = document.getElementById("lowTrades")
    let high = document.getElementById("highTrades")

    let header = `<tr>
    <th>Time</th><th>Symbol</th><th>Entry</th>
    <th>TP</th><th>SL</th><th>Risk</th><th>PnL</th></tr>`

    low.innerHTML = header
    high.innerHTML = header

    let count = 0

    data.open_trades.forEach(t=>{
        count++

        let live = map[t.symbol] || t.entry
        let pnl = (live - t.entry)/t.entry*100
        let cls = pnl>=0?"green":"red"

        let row = `
        <tr>
        <td>${formatTime(t.time)}</td>
        <td>${t.symbol}</td>
        <td>${t.entry}</td>
        <td>${t.tp}</td>
        <td>${t.sl}</td>
        <td><b>${t.risk}</b></td>
        <td class="${cls}">${pnl.toFixed(2)}%</td>
        </tr>`

        if(t.risk >=3) low.innerHTML += row
        else high.innerHTML += row
    })

    document.getElementById("activeTrades").innerText = count
}

// ================= PRICES =================
async function loadPrices(){
    let data = await safeFetch("/prices") || []

    let table = document.getElementById("prices")
    table.innerHTML = `<tr><th>Symbol</th><th>Price</th></tr>`

    data.forEach(p=>{
        let prev = lastPrices[p.symbol] ?? p.price
        let cls = p.price>prev?"green":p.price<prev?"red":""

        table.innerHTML += `
        <tr>
        <td>${p.symbol}</td>
        <td class="${cls}">${p.price.toFixed(4)}</td>
        </tr>`

        lastPrices[p.symbol] = p.price
    })
}

// ================= HISTORY =================
async function loadHistory(){
    let data = await safeFetch("/history")
    if(!data) return

    renderHistory(data.strategyA, "historyA")
    renderHistory(data.strategyB, "historyB")
}

function renderHistory(data, id){
    let container = document.getElementById(id)
    container.innerHTML=""

    if(!data) return

    let balance = 2000

    Object.keys(data).reverse().forEach(date=>{
        let trades = data[date]
        let pnl = trades.reduce((a,t)=>a+t.profit,0)
        balance += pnl

        container.innerHTML += `
        <div style="margin-bottom:10px;padding:10px;background:#0b0f14;">
        <b>${date}</b> |
        Trades:${trades.length} |
        PnL:<span class="${pnl>=0?'green':'red'}">$${pnl.toFixed(2)}</span> |
        Balance:$${balance.toFixed(2)}
        </div>`
    })
}

// ================= BALANCE =================
async function loadBalance(){
    let data = await safeFetch("/history")
    if(!data) return

    let balance = 2000

    Object.values(data.strategyA).forEach(day=>{
        day.forEach(t=> balance += t.profit)
    })

    document.getElementById("balance").innerText =
        "$" + balance.toFixed(2)
}

// ================= CALC =================
function calc(){
    let inv = parseFloat(inv.value)||0
    let entry = parseFloat(entry.value)||0
    let sl = parseFloat(sl.value)||0
    let tp = parseFloat(tp.value)||0
    let lev = parseFloat(lev.value)||1

    let size = inv*lev
    let qty = size/entry
    let profit = (tp-entry)*qty
    let loss = (sl-entry)*qty

    result.innerHTML =
    `<div class="green">Profit: $${profit.toFixed(2)}</div>
     <div class="red">Loss: $${loss.toFixed(2)}</div>`
}

function compoundCalc(){
    let start = parseFloat(c_start.value)||0
    let risk = (parseFloat(c_risk.value)||0)/100
    let win = (parseFloat(c_winrate.value)||0)/100
    let trades = parseInt(c_trades.value)||0
    let days = parseInt(c_days.value)||0

    let bal = start
    let out=""

    for(let d=1; d<=days; d++){
        for(let t=0;t<trades;t++){
            if(Math.random()<win) bal+=bal*risk
            else bal-=bal*risk
        }
        out += `Day ${d}: $${bal.toFixed(2)}<br>`
    }

    compoundResult.innerHTML =
    `<div class="green">$${bal.toFixed(2)}</div>${out}`
}

// ================= LOOP =================
function update(){
    loadTrades()
    loadPrices()
    loadHistory()
    loadBalance()
}

setInterval(update,4000)
update()

</script>

</body>
</html>
