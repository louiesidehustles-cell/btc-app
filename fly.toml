# fly.toml app configuration file generated for btc-app-withered-flower-2181 on 2026-04-16T11:47:19+10:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'btc-app-withered-flower-2181'
primary_region = 'syd'

[build]

[processes]
  app = 'python app.py'

[[mounts]]
  source = 'btc_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
